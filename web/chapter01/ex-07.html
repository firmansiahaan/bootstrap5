<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CSS Framework: Bootstrap5 - Color Classes</title>
        <! -- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
    </head>
    <body>
        <div class="m-4">
            <div class="text-primary">.text-primary</div>
            <div class="text-secondary">.text-secondary</div>
            <div class="text-success">.text-success</div>
            <div class="text-danger">.text-danger</div>
            <div class="text-warning">.text-warning</div>
            <div class="text-info">.text-info</div>
            <div class="text-light">.text-light</div>
            <div class="text-dark">.text-dark</div>
            <div class="text-body">.text-body</div>
            <div class="text-muted">.text-muted</div>
            <div class="text-white bg-dark">.text-white</div>
            <div class="text-black-50">.text-black-50</div>
            <div class="text-white-50 bg-dark">.text-white-50</div>
        </div>

        
        <! -- Bootstrap JS Bundle with Popper -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
