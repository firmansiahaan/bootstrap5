<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CSS Framework: Bootstrap5 - Shadow Classes</title>
        <! -- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
    </head>
    <body>
        <div class="container m-4">
            <table class="table table-light nobordered">
                <thead>
                    <tr>
                        <th class="text-start">Class</th>
                        <th class="text-center">Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-start">.shadow</td>
                        <td class="text-start shadow">Add a shadow to an element.</td>
                    </tr>
                    <tr>
                        <td class="text-start">.shadow-sm</td>
                        <td class="text-start shadow-sm">Add a small shadow to an element.</td>
                    </tr>
                    <tr>
                        <td class="text-start">.shadow-lg</td>
                        <td class="text-start shadow-lg">Add a larger shadow to an element.</td>
                    </tr>
                    <tr>
                        <td class="text-start">.shadow-none</td>
                        <td class="text-start shadow-none">Remove shadow from an element..</td>
                    </tr>
                </tbody>
            </table>
        </div>

        
        <! -- Bootstrap JS Bundle with Popper -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
