<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <! -- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.
min.css" rel="stylesheet" integrity="sha384-
EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
        <title>CSS Framework: Bootstrap5 - Three Column Layouts</title>
    </head>
    <body>
        <div class="container">
            <!--Row with two equal columns-->
            <div class="row">
                <div class="col-lg-4 bg-primary text-white">Column left - 4 column</div>
                <div class="col-lg-4 bg-secondary text-white">Column middle - 4 column</div>
                <div class="col-lg-4 bg-danger text-white">Column right - 4 column</div>
            </div>

            <!--Row with two columns divided in 1:2 ratio-->
            <div class="row">
                <div class="col-lg-2 bg-primary text-white">Column left - 2 column</div>
                <div class="col-lg-8 bg-secondary text-white">Column middle - 8 column</div>
                <div class="col-lg-2 bg-danger text-white">Column right - 2 column</div>
            </div>

            <!--Row with two columns divided in 1:3 ratio-->
            <div class="row">
                <div class="col-lg-3 bg-primary text-white">Column left - 3 column</div>
                <div class="col-lg-7 bg-secondary text-white">Column middle - 7 column</div>
                <div class="col-lg-2 bg-danger text-white">Column right - 2 column</div>
            </div>
        </div>


        <! -- Bootstrap JS Bundle with Popper -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
