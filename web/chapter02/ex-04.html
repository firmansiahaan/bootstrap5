<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <! -- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
        <title>CSS Framework: Bootstrap5 - Auto-layout Columns</title>
    </head>
    <body>
        <div class="container">
            <!--Row with two equal columns-->
            <div class="row">
                <div class="col bg-primary text-white">Column One</div>
                <div class="col bg-danger text-white">Column Two</div>
            </div>

            <!--Row with three equal columns-->
            <div class="row">
                <div class="col bg-primary text-white">Column One</div>
                <div class="col bg-secondary text-white">Column Two</div>
                <div class="col bg-danger text-white">Column Three</div>
            </div>
            
            <!--Row with three columns divided in 1:2:1 ratio-->
            <div class="row">
                <div class="col bg-primary text-white">Column one - Auto column</div>
                <div class="col-sm-6 bg-secondary text-white">Column two - 6 columns</div>
                <div class="col bg-danger text-white">Column three - Auto column</div>
            </div>
        </div>


        <! -- Bootstrap JS Bundle with Popper -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
