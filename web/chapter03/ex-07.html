<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <! -- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
        <title>CSS Framework: Bootstrap5 - Wrapping Long Word</title>
    </head>
    <body>

        <div class="container">
            <h2>Without Word Break</h2>
                <div class="row">
                    <div class="col-2">
                        <p class="bg-warning">veryveryveryveryveryveryverylongword</p>
                    </div>
                </div>
                <hr />
                <h2>With Word Break</h2>
                <div class="row">
                    <div class="col-2">
                        <p class="bg-warning text-break">veryveryveryveryveryveryverylongword</p>
                    </div>
                </div>
            </div>
        </div>


        <! -- Bootstrap JS Bundle with Popper -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
