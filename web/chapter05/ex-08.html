<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Placing Checkboxes and Radio Buttons Inline</title>
        <! -- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
    </head>
    <body>
        <div class="m-4">
            <form action="/examples/actions/confirmation.php" method="post">
                <h3 class="mb-4">Default Placement of Checkboxes</h3>
                <div class="row">
                    <div class="col-12">
                        <div class="form-check mb-3">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                name="hobbies"
                                id="checkMusic"
                            />
                            <label class="form-check-label" for="checkMusic">Music</label>
                        </div>
                        <div class="form-check mb-3">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                name="hobbies"
                                id="checkTravel"
                                checked
                            />
                            <label class="form-check-label" for="checkTravel">Travel</label>
                        </div>
                        <div class="form-check">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                name="hobbies"
                                id="checkReading"
                                checked
                            />
                            <label class="form-check-label" for="checkReading">Reading</label>
                        </div>
                    </div>
                </div>
                <hr />
                <h3 class="mb-4">Inline Placement of Checkboxes</h3>
                <div class="row">
                    <div class="col-12">
                        <div class="form-check form-check-inline">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                name="hobbies"
                                id="checkMusic"
                            />
                            <label class="form-check-label" for="checkMusic">Music</label>
                        </div>
                        <div class="form-check form-check-inline ms-3">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                name="hobbies"
                                id="checkTravel"
                                checked
                            />
                            <label class="form-check-label" for="checkTravel">Travel</label>
                        </div>
                        <div class="form-check form-check-inline ms-3">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                name="hobbies"
                                id="checkReading"
                                checked
                            />
                            <label class="form-check-label" for="checkReading">Reading</label>
                        </div>
                    </div>
                </div>`
            </form>
        </div>

        <! -- Bootstrap JS Bundle with Popper -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
