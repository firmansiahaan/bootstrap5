<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <title>Height Sizing of Form Controls</title>
        <! -- Bootstrap CSS -->
<link

    <body>

                    <div class="col-sm-10">
                        <select class="form-select form-select-lg">
                            <option>Large select</option>

                    </div>

                    <label class="col-sm-2 col-form-label">State</label>

                    <div class="col-sm-10">
