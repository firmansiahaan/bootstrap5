<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Card Image Overlays</title>
        <! -- Boot  strap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
crossorigin="anonymous">
    </head>
    <body>
        <div class="m-4">
            <div class="card text-white" style="width: 350px">
                <img src="../../images/sample.png" class="card-img-top" alt="..." />
                <div class="card-img-overlay">
                    <h5 class="card-title">Alice Liddel</h5>
                    <p class="card-text">
                        Alice is a freelance web designer and developer based in London. She
                        is specialized in HTML5, CSS3, JavaScript, Bootstrap, etc.
                    </p>
                    <a href="#" class="btn btn-primary stretched-link">View Profile</a>
                </div>
            </div>
        </div>

        <! -- Bootstrap JS Bundle with Popper -->
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
crossorigin="anonymous"></script>
    </body>
</html>
